 catholic_desc:0 "De rooms-katholieke kerk beweert dat Jezus de sleutels van het koninkrijk der hemelen aan Sint-Petrus heeft geschonken en dat de paus, als zijn rechtmatige opvolger, daarom de hoogste spirituele autoriteit is van de hele christelijke wereld."


