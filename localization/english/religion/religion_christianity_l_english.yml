 cathar_adherent:0 "Kathaar"
 cathar_adherent_plural:0 "Katharen"
 cathar_desc:0 "Katharen, die onderwijzen dat alle materie door Satan is geschapen en daarom inherent met zonde is besmet, geloven dat de enige manier om verlossing te bereiken is door de materialistische wereld te verwerpen, en daarmee alle wereldse verlangens."
