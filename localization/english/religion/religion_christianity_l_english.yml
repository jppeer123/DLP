 armenian_apostolic_adj:1 "Apostolisch"
 armenian_apostolic_adherent:1 "Apostolist"
 armenian_apostolic_adherent_plural:1 "Apostolisten"
 armenian_apostolic_desc:1 "Opgericht door de apostelen Bartholomeüs en Thaddeüs, kreeg de Armeense Apostolische Kerk snel aanhang in de regio en zorgde ervoor dat het koninkrijk Armenië de eerste staat werd die ooit het christendom als officiële religie adopteerde."
 apostolic_religious_head_title:0 "katholikos"
 apostolic_religious_head_title_plural:0 "katholikoi"
 apostolic_religious_head_title_name:0 "kerk"


 nestorian:0 "Nestorianisme"
 nestorian_adj:0 "Nestoriaans"
 nestorian_adherent:0 "Nestoriaan"
 nestorian_adherent_plural:0 "Nestorianen"
 nestorian_desc:0 "Door te onderwijzen dat Jezus Christus twee naturen heeft, een goddelijke en een menselijke, is het Nestorianisme door de meeste christelijke stromingen als ketters verklaard. Desondanks heeft het unieke vooruitzicht van het Nestorianisme volgelingen opgeleverd in plaatsen zo ver naar het oosten als Mongolië, India en zelfs China."
 nestorian_religious_head_title:0 "Patriarch"
 nestorian_religious_head_title_name:0 "Patriarchaat"

 messalian:0 "Messalianisme"
 messalian_adj:0 "Messaliaans"
 messalian_adherent:1 "Messaliaan"
 messalian_adherent_plural:0 "Messalianen"
 messalian_desc:0 "In de overtuiging dat de essentie van God kan worden waargenomen door de vleselijke zintuigen, verwerpen de Messalen traditionele christelijke sacramenten en proberen in plaats daarvan God rechtstreeks te ervaren door middel van minder conventionele manieren van aanbidding."
 messalian_priest:0 "perfect"
 messalian_priest_plural:0 "perfecti"

 adamites:0 "Adamietisme"
 adamites_adj:0 "Adamietisch"
 adamites_adherent:0 "Adamiet"
 adamites_adherent_plural:0 "Adamieten"
 adamites_desc:0 "De Adamieten beweren de oorspronkelijke staat van onschuld van Adam en Eva te hebben heroverd door hun kleren af te werpen. Groepen Adamieten leven vaak in een staat van absolute wetteloosheid en beweren dat hun daden vanwege deze onschuld noch goed, noch slecht kunnen zijn."
