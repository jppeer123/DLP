 waldensian:0 "Waldenzisme
 waldensian_adj:0 "Waldens"
 waldensian_adherent:0 Walden"
 waldensian_adherent_plural:0 "Waldenzen"
 waldensian_desc:0 "De Waldenzen beweren dat het vergaren van rijkdom een anathema is dat onverenigbaar is met het bereiken van de verlossing, en prediken apostolische armoede als de weg naar volmaaktheid en geloven dat priesters geen titels of land mogen bezitten."

 lollard:0 "Lollardisme"
 lollard_adj:0 "Lollards"
 lollard_adherent:0 "Lollard"
 lollard_adherent_plural:0 "Lollards"
 lollard_desc:0 "Lollards hekelen veel gewone christelijke sacramenten, zoals de doop en belijdenis, en zijn van mening dat de Bijbel de enige geldige bron van de christelijke doctrine is en dat alle leringen die er niet rechtstreeks op zijn gebaseerd, inherent onwettig zijn."

 insular_celtic:0 "Keltisch christendom"
 insular_celtic_adj:0 "Keltisch"
 insular_celtic_adherent:0 "Keltische christen"
 insular_celtic_adherent_plural:0 "Keltische christenen"
 insular_celtic_desc:1 "Een plattelands kerk die enkele eeuwen geleden van de rooms-katholieke orthodoxie is afgedreven, heeft het Keltische christendom veel van zijn eens zo kenmerkende kenmerken verloren op aandringen van zijn moederkerk. Het legt toch een grotere nadruk op boete en monnikendom, en bevat veel traditionele Keltische huwelijksgebruiken die vreemd zijn aan het bredere christendom."

