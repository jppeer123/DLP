 bosnian_church_desc:0 "Lang vergeten door zowel katholieken als orthodoxen, zijn de Bosnische christenen van de Bosnische hooglanden toleranter dan hun bekendere landgenoten, maar missen ze een formele structuur. Met behoud van veel archaïsche elementen van het christendom, worden ze vaak minachtend behandeld door hun geloofsgenoten, als ze al worden herinnerd."

