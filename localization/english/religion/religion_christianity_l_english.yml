 conversos:0 "Conversos"
 conversos_adj:0 "Converso"
 conversos_adherent:0 "Converso"
 conversos_adherent_plural:0 "Conversos"
 conversos_desc:0 "De Conversos zijn ontstaan toen Joodse gemeenschappen met geweld tot het christendom werden bekeerd. Hoewel ze hun nieuwe geloof hebben omarmd, herinneren ze zich nog steeds hun oude tradities en staan ze sympathiek tegenover degenen die ze nog steeds volgen."

 #Orthodox-Group Faiths
 orthodox:0 "Oosters-Orthodoxe Kerk"
 orthodox_adj:0 "Oosters-Orthodox"
 orthodox_adherent:0 "Oosters-Orthodox christen"
 orthodox_adherent_plural:0 "Oosters-Orthodox christenen"
 orthodox_desc:0 "Terwijl de oosters-orthodoxe kerk beweert dat haar bisschoppen de ware en directe opvolgers zijn van de apostelen van Christus, beweert ze het oorspronkelijke christelijke geloof te zijn zoals het is doorgegeven via de heilige liturgische traditie."
 orthodox_religious_head_title:0 "Patriarch"
 orthodox_religious_head_title_name:0 "Patriarchaat"

 bogomilist:0 "bogomilisme"
 bogomilist_adj:0 "bogomilistisch"
 bogomilist_adherent:0 "bogomiel"
 bogomilist_adherent_plural:0 "bogomielen"
 bogomilist_desc:0 "Door hun spirituele leiders uit de algemene bevolking te kiezen, verwerpen Bogomielen alle wereldse attributen en machtsinstellingen, en pleiten ze in plaats daarvan voor een terugkeer naar de vroegere methoden van spiritueel onderwijs die door Christus en zijn discipelen werden beoefend."
 bogomilist_priest:0 "elect"
 bogomilist_priest_plural:0 "elects"

 paulician:0 "Paulicianisme"
 paulician_adj:0 "Pauliciaans"
 paulician_adherent:0 "Pauliciaan"
 paulician_adherent_plural:0 "Paulicianen"
 paulician_desc:0 "Door de goddelijkheid van Christus af te wijzen en de verering van het kruis als heidens te beschouwen, streven Pauliciërs ernaar om te herstellen wat volgens hen de ware vorm van het christendom is, zoals uiteengezet door Paulus van Tarsus."
 paulician_religious_text:0 "Sleutel van de waarheid"

 iconoclast:0 "Iconoclasme"
 iconoclast_adj:0 "iconoclastisch"
 iconoclast_adherent:0 "iconoclast"
 iconoclast_adherent_plural:0 "iconoclasten"
 iconoclast_desc:0 "In de overtuiging dat elk gebruik van spirituele symbolen in strijd is met het tweede gebod om geen gesneden beelden te maken, proberen de beeldenstormers de bestaande religieuze iconografie te vernietigen en de creatie van nieuwe te verwerpen."
 
