 coptic_adj:0 "koptisch"
 coptic_adherent:0 "koptisch-orthodoxe christen"
 coptic_adherent_plural:0 "koptisch-orthodoxe christenen"
 coptic_desc:0 "De Koptische Kerk, die haar oorsprong vindt in de heilige Mark de Evangelist, staat zowel bekend als de geboorteplaats van het christelijk monnikendom als het in stand houden van een lange traditie van de bevordering van onderwijs en filosofie."
