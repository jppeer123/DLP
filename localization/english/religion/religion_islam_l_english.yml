 islam_religion_adherent_plural:0 "moslims"
 islam_religion_desc:0 "De islam is de laatste openbaring van het Abrahamitische geloof, geleid door het woord van God, zoals geopenbaard aan de profeet Mohammed. Het richt zich op het leiden van een goed leven in dienstbaarheid aan de enige barmhartige God."
