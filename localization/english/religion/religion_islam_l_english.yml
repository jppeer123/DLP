 #Shia
 islam_shia_priest:0 "moella"
 islam_shia_priest_plural:0 "moellas"
 islam_shia_religious_head_title:0 "Imam"
 islam_shia_religious_head_title_name:0 "Imamaat"

 #Ash'ari
 ashari:0 "Asharisme"
 ashari_adj:0 "Asharistisch"
 ashari_adherent:0 "Ashariet"
 ashari_adherent_plural:0 "Asharieten"
 ashari_desc:0 "Een orthodoxe theologische school die stelt dat Allah elk moment in de tijd heeft geschapen, maar dat mensen vrije wil hebben om te kiezen tussen goed - wat God geboden heeft - en kwaad - wat God verbiedt."

 #Muwalladism
 muwalladi:0 "Muladisme"
 muwalladi_adj:0 "Muladisch"
 muwalladi_adherent:0 "Muladi"
 muwalladi_adherent_plural:0 "muladis"
 muwalladi_desc:1 "Ver weg van het centrum van de Arabische wereld, hebben Iberische moslims zich aangepast aan de realiteit van het regeren over een regio met een grote christelijke en joodse bevolking met vreemde, buitenlandse tradities."

 #Masmudism
 masmudi:1 "Almohadisme"
 masmudi_adj:1 "Almohadisch"
 masmudi_adherent:1 "Almohad"
 masmudi_adherent_plural:1 "Almohaden"
 masmudi_desc:2 "Een hervormingsgezinde tak van de soennitische islam die zijn oorsprong vond bij de Berberstammen in Noord-Afrika, de Almohadi-beweging zag zichzelf als unitariërs en predikte een doctrine van gezuiverd monotheïsme."
 masmudi_religious_head_title:0 "Mahdi"
 masmudi_religious_head_title_name:0 "Kalifaat"

 #Mu'tazila
 mutazila:0 "Moetazilisme"
 mutazila_adj:0 "Moetazilisch"
 mutazila_adherent:0 "Moetazilist"
 mutazila_adherent_plural:0 "Moetazilisten"
 mutazila_desc:0 "Een rationalistische theologische school die beweert dat de koran #EMP niet#! eeuwig naast God bestaat, aangezien God aan zijn eigen woord moet zijn voorafgegaan."

 #Maturidi
 maturidi:0 "Maturidisme"
 maturidi_adj:0 "Maturidisch"
 maturidi_adherent:0 "Maturidi"
 maturidi_adherent_plural:0 "Maturidis"
 maturidi_desc:0 "Een rationalistische theologie die vaststelt dat ethiek een objectief bestaan heeft, zoals afgeleid van de eeuwige kwaliteiten van God, en dat mensen daarom ethische keuzes moeten nastreven."
 
 #Quranism
 quranist:0 "Koranisme"
 quranist_adj:0 "Koranisch"
 quranist_adherent:0 "Koranist"
 quranist_adherent_plural:0 "Koranisten"
 quranist_desc:0 "Een letterlijke interpretatie van de islam die benadrukt dat de koran de enige bron van goddelijke wijsheid is, en tot op de letter gevolgd moet worden. Hadith en fatwa's  worden genegeerd."

 #Ismaili
 ismaili:0 "Ismaïlisme"
 ismaili_adj:0 "Ismaïlisch"
 ismaili_adherent:0 "Ismaïlist"
 ismaili_adherent_plural:0 "Ismaïlisten"
 ismaili_desc:0 "Een sjiitische geloof dat de lijn van ware imams - degenen die doordrenkt zijn met goddelijke kennis en onfeilbaarheid - beschouwt als door Isma'il bin Jafar heen. Ze staan ook bekend als Zeveners, omdat Isma'il de zevende imam was na Mohammed."

 #Qarmatians
 qarmatian:0 "Karmatisme"
 qarmatian_adj:0 "Karmatisch"
 qarmatian_adherent:0 "Karmatiër"
 qarmatian_adherent_plural:0 "Karmatiërs"
 qarmatian_desc:0 "Een tak van het isma'ilisme waarin elementen van het zoroastrisme zijn opgenomen. Het aantal imams was door God voorbeschikt op zeven, en daarom konden er geen imams meer zijn voordat de zevende imam - Muhammad ibn Isma'il - terugkeerde om de gelovigen te leiden."

 #Nizari
 nizari:0 "Nizarisme"
 nizari_adj:0 "Nizarisch"
 nizari_adherent:0 "Nizariet"
 nizari_adherent_plural:0 "Nizarieten"
 nizari_desc:0 "Een rationalistisch geloof dat redenering benadrukt bij de interpretatie van de koran en hadiths. Imam zijn is erfelijk, en ze volgen de lijn van opvolging naar Ali."
 
 #Zayidi
 zayidi:0 "Zajidisme"
 zayidi_adj:0 "Zajidisch"
 zayidi_adherent:0 "Zajidiet"
 zayidi_adherent_plural:0 "Zajidieten"
 zayidi_desc:0 "Een echte imam is niet onfeilbaar, maar wordt bepaald door hun strijd tegen corruptie en kwaad. Zajidieten worden daarom gedefinieerd door hun overtuiging dat Zayd ibn Ali de rechtmatige opvolger was van de imamaat, vanwege zijn opstand tegen de Umayyaden."

 #Imamism (Twelver)
 imami:0 "Imamisme"
 imami_adj:0 "Imamisch"
 imami_adherent:0 "Imamiet"
 imami_adherent_plural:0 "Imamieten"
 imami_desc:0 "Imamieten geloven dat er van de twaalf imams werd geprofeteerd dat ze de ummah zouden leiden, en dat de twaalfde imam, imam Zaman, wacht om terug te keren om moslims naar de dag des oordeels te leiden."
 islam_ayatollah:0 "ayatollah"
 islam_ayatollah_plural:0 "ayatollahs"

 #
 ghulat:1 "Iktilafisme"
 ghulat_adj:1 "Iktilafisch"
 ghulat_adherent:1 "Iktilafiet"
 ghulat_adherent_plural:1 "Iktilafieten"
 ghulat_desc:1 "Iktilafieten geloven in de goddelijke aard van de onfeilbare imams, te beginnen met Ali. God heeft hen niet alleen aangesteld en geïnspireerd, maar bewoont hen gedeeltelijk om hun daden te leiden, en bij uitbreiding de hele Ummah."

 alawite:0 "Alawisme"
 alawite_adj:0 "Alawisch"
 alawite_adherent:0 "Alawiet"
 alawite_adherent_plural:0 "Alawieten"
 alawite_desc:0 "Alawitische religieuze leringen zijn geheimzinnig en de koran is slechts een van hun heilige teksten. Naast het geloof in de opvolging van imams door Ali, geloven Alawieten ook in reïncarnatie, en dat alle wezens sterren waren die uit de hemel zijn geworpen en die nu hun plaats moeten herwinnen door opeenvolgende goede en trouwe levens te leiden."

 #Alevis
 alevi:0 "Alevitisme"
 alevi_adj:0 "Alevitisch"
 alevi_adherent:0 "Aleviet"
 alevi_adherent_plural:0 "Alevieten"
 alevi_desc:0 "Alevieten geloven in de opvolging van de twaalf imams, maar volgen ook vele andere tradities zoals uiteengezet in hun verzameling heilige teksten, de Buyruks. In de alevitische traditie is God de waarheid, en Mohammed en Ali zijn manifestaties van Hem in de wereld."
 alevi_house_of_worship:0 "cemvi"
 alevi_house_of_worship_plural:0 "cemvis"
 alevi_religious_text:0 "Buyruks"

 #Druze
 druze:0 "Druzisme"
 druze_adj:0 "Druzisch"
 druze_adherent:0 "Druze"
 druze_adherent_plural:1 "Druzen"
 druze_desc:0 "Afkomstig van de Berg van Druzen, volgt het Druzen-geloof veel van de principes van het isma'ilisme, maar omvat ook gnostische overtuigingen in een esoterische theologie die gericht is op de waarheid van het bestaan."
 druze_religious_text:0 "Brieven van wijsheid"

 #Ibadi
 ibadi:1 "Ibadisme"
 ibadi_adj:0 "Ibadisch
 ibadi_adherent:0 "Ibadiet"
 ibadi_adherent_plural:0 "Ibadieten"
 ibadi_desc:0 "De Ibadieten geloven niet dat het nodig is dat de hele islam wordt geregeerd door een kalief of een imam, als er geen geschikte kandidaat is. Ze zijn daarom Muhakkima en erkennen noch de lijn van Ali, noch de opvolgers van Abu Bakr als waardige leiders."

 #Azariqa
 azariqa:1 "Azraqisme"
 azariqa_adj:0 "Azraqisch"
 azariqa_adherent:0 "Azraqiet"
 azariqa_adherent_plural:0 "Azraqieten"
 azariqa_desc:0 "De Azraqieten erkennen geen waardige opvolger van Mohammed en beschouwen het als hun recht en plicht om te strijden tegen elke leider die de waarden van hun geloof niet hooghoudt. Inderdaad, elk verschil in interpretatie van geloof zou iemand als een ongelovige markeren."

 #Najdat
 najdat:0 "Najdatisme"
 najdat_adj:0 "Najdatisch"
 najdat_adherent:0 "Najdatiet"
 najdat_adherent_plural:0 "Najdatieten"
 najdat_desc:0 "Aanhangers van de Najdati-tak van de Khawarij geloven sterk in het vestigen van moslimleiderschap door de consensus van de gelovigen. De leider is niet onfeilbaar, maar door de gemeenschap worden ze door God gekozen."
 
 #Sufri
 sufri:0 "Soefisme"
 sufri_adj:0 "Soefisch"
 sufri_adherent:0 "Soefi"
 sufri_adherent_plural:0 "Soefi's"
 sufri_desc:0 "De Soefi's geloven in goddelijke leiding en leiderschap door de interpretatie van het woord van God, in plaats van erfelijkheid. De wil van God wordt bekend als een uitdrukking van de wil van de Ummah, zolang de mensen van de Ummah goed thuis zijn in de Koran."
